# Sheldon configuration
# https://sheldon.cli.rs/
#
# NOTE: GitHub plugins keep `proto = "https"` as defense-in-depth.
# sheldon uses libgit2, which cannot use the system SSH agent — any rewrite
# from HTTPS to SSH (`url.<ssh>.insteadOf = https://...`) makes clone hang
# forever on auth.
#
# Required gitconfig on every host:
#   url."git@github.com:".pushInsteadOf = https://github.com/
# (Use `pushInsteadOf`, NOT `insteadOf`, so fetch stays HTTPS for libgit2.)

shell = "zsh"

# =============================================================================
# Deferred loading template (for performance)
# =============================================================================
[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"

# =============================================================================
# Essential Plugins
# =============================================================================

[plugins.zsh-defer]
github = "romkatv/zsh-defer"
proto = "https"

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ["{{ name }}.zsh"]
apply = ["defer"]
proto = "https"

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
apply = ["defer"]
proto = "https"

[plugins.zsh-history-substring-search]
github = "zsh-users/zsh-history-substring-search"
apply = ["defer"]
proto = "https"

[plugins.zeno]
github = "yuki-yano/zeno.zsh"
proto = "https"

# =============================================================================
# Prompt (optional - uncomment if you want to use starship or pure)
# =============================================================================
# [plugins.starship]
# inline = 'eval "$(starship init zsh)"'

# [plugins.pure]
# github = "sindresorhus/pure"
# use = ["async.zsh", "pure.zsh"]

# =============================================================================
# Local dotfiles scripts
# =============================================================================
[plugins.dotfiles-tools]
local = "~/.config/zsh"
use = ["tools.zsh"]

[plugins.dotfiles-fzf-worktree]
local = "~/.config/zsh"
use = ["fzf-worktree.zsh"]

[plugins.dotfiles-peco]
local = "~/.config/zsh"
use = ["peco.zsh"]

[plugins.dotfiles-mac]
local = "~/.config/zsh"
use = ["mac.zsh"]
profiles = ["macos"]

[plugins.dotfiles-linux]
local = "~/.config/zsh"
use = ["linux.zsh"]
profiles = ["linux"]

[plugins.dotfiles-alias-common]
local = "~/.config/zsh/alias"
use = ["common_alias.zsh"]

[plugins.dotfiles-alias-mac]
local = "~/.config/zsh/alias"
use = ["mac_alias.zsh"]
profiles = ["macos"]

[plugins.dotfiles-alias-linux]
local = "~/.config/zsh/alias"
use = ["linux_alias.zsh"]
profiles = ["linux"]

[plugins.dotfiles-agent-skills]
local = "~/.config/zsh"
use = ["agent-skills.zsh"]

[plugins.dotfiles-codex-claude-command]
local = "~/.config/zsh"
use = ["codex-claude-command.zsh"]

[plugins.dotfiles-zeno]
local = "~/.config/zsh"
use = ["zeno.zsh"]

[plugins.dotfiles-gcloud]
local = "~/.config/zsh"
use = ["gcloud.zsh"]

[plugins.dotfiles-terraform]
local = "~/.config/zsh"
use = ["terraform.zsh"]

# Load syntax highlighting last and without deferred sourcing.
# It registers ZLE hooks and is sensitive to load order.
[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"
proto = "https"
