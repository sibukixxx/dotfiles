name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
          ignore_paths: >-
            dot_config/zsh
            .vim
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2034 -e SC2155 -e SC2038 -e SC2207 -e SC2053

  chezmoi-verify:
    name: Chezmoi Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Verify chezmoi templates
        run: |
          # テンプレート構文チェック（dry-run）
          chezmoi execute-template < /dev/null || true

          # .tmpl ファイルの基本的な構文チェック
          unclosed=0
          while IFS= read -r file; do
            echo "Checking: $file"
            if grep -qE '\{\{[^}]*$' "$file"; then
              echo "::error file=$file::Unclosed template tag"
              unclosed=1
            fi
          done < <(find . -name "*.tmpl" -type f)
          exit "$unclosed"

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install --user yamllint

      - name: Run yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/workflows/*.yml

  toml-check:
    name: TOML Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
            | gunzip > /usr/local/bin/taplo
          chmod +x /usr/local/bin/taplo

      - name: Check TOML files
        run: |
          status=0
          while IFS= read -r file; do
            echo "Checking: $file"
            if ! taplo check "$file"; then
              status=1
            fi
          done < <(find . -name "*.toml" -type f)
          exit "$status"

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false
            }
        continue-on-error: true

  validate-brewfile:
    name: Validate Brewfile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Brewfile syntax
        run: |
          if [ -f Brewfile ]; then
            ruby -c Brewfile
          fi
